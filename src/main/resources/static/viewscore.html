<!DOCTYPE html>
<html>
<head>
    <title>View Score</title>

	<style>
	body {
	    font-family: Arial;
	    margin: 0;
	    background: #f4f6f9;
	    padding-top: 80px; /* ✅ important for navbar space */
	}

	/* NAVBAR */
	.navbar {
	    position: fixed;
	    top: 0;
	    width: 100%;
	    height: 70px;
	    background: rgba(0, 0, 0, 0.9);
	    display: flex;
	    justify-content: space-between;
	    align-items: center;
	    padding: 0 40px;
	    z-index: 100;
	    
	    box-sizing: border-box; /* ✅ ADD THIS */
	}

	.logo {
	    color: #fff;
	    font-size: 22px;
	    font-weight: bold;
	}

	.nav-links a {
	    color: #fff;
	    text-decoration: none;
	    margin-left: 20px;
	    font-weight: 500;
	    padding: 8px 15px;
	    border-radius: 6px;
	    transition: 0.3s;
	}

	.nav-links a:hover {
	    background: #ffcc00;
	    color: black;
	}

	/* CONTAINER */
	.container {
	    width: 50%;
	    margin: auto;
	    background: white;
	    padding: 30px;
	    border-radius: 12px;
	    text-align: center;
	    box-shadow: 0 0 15px rgba(0,0,0,0.1);
	}

	/* INPUT + BUTTON */
	input {
	    width: 100%;
	    padding: 12px;
	    margin: 12px 0;
	    border-radius: 6px;
	    border: 1px solid #ccc;
	    font-size: 16px;
	}

	button {
	    width: 100%;
	    padding: 12px;
	    margin-top: 10px;
	    background: blue;
	    color: white;
	    border: none;
	    cursor: pointer;
	    border-radius: 6px;
	    font-size: 16px;
	    transition: 0.3s;
	}

	button:hover {
	    background: darkblue;
	}

	/* SCORE BOX */
	.score-box {
	    margin-top: 20px;
	    font-size: 24px;
	    font-weight: bold;
	    color: green;
	}
	</style>
</head>

<body>
	<!-- NAVBAR -->
	<div class="navbar">
	    <div class="logo">Quiz Portal</div>
	    <div class="nav-links">
			<a href="user.html">Home Page</a>
	        <a href="quiz.html">Start Quiz</a>
			<!-- <a href="viewscore.html">View Score</a>-->
	        <a href="profile.html">Profile</a>
	        <a href="index.html">Logout</a>
	    </div>
	</div>

<div class="container">

    <h2>View Quiz Score</h2>

    <input type="number" id="quizId" placeholder="Enter Quiz ID">
    <input type="number" id="userId" placeholder="Enter User ID">

    <button onclick="getScore()">Get Score</button>

    <div id="result" class="score-box"></div>

</div>

<script>

function getScore() {

    let quizId = document.getElementById("quizId").value;
    let userId = document.getElementById("userId").value;

    fetch(`http://localhost:8080/quiz/score/${quizId}/${userId}`)
    .then(res => res.json())
    .then(data => {

        console.log("SCORE RESPONSE:", data);

        document.getElementById("result").innerHTML =
            `Your Score: ${data.score}`;

    })
    .catch(err => {
        console.log(err);
        document.getElementById("result").innerHTML =
            "Error fetching score!";
    });
}

</script>

</body>
</html>
