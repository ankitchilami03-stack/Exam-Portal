<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 5px rgba(79,172,254,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00c6ff;
        }

        #message {
            margin-top: 15px;
            color: red;
            font-weight: bold;
        }

        .footer-text {
            margin-top: 15px;
            font-size: 14px;
            color: #777;
        }
		/* NAVBAR */
				        .navbar {
				            background-color: rgba(0,0,0,0.7);
				            padding: 15px;
				            position: fixed;
				            width: 100%;
				            top: 0;
				            z-index: 1000;
				        }

				        .navbar a {
				            color: white;
				            margin-right: 25px;
				            text-decoration: none;
				            font-size: 18px;
				            font-weight: bold;
				        }

				        .navbar a:hover {
				            color: yellow;
				        }
    </style>

</head>
<body>
	<div class="navbar">
		    <a href="index.html">Home</a>
		    <a href="login.html">Start Quiz</a>
		    <a href="aboutus.html">About Us</a>
		    <a href="contact.html">Contact</a>
			<a href="register.html" style="margin-left: 60%;">Register</a>
			<a href="login.html">Login</a>

		</div>


<div class="login-container">
    <h2>Welcome Back</h2>

    <form id="loginForm">

        <input type="email" id="email" placeholder="Enter Email" required>

        <input type="password" id="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
		<div class="note">
		        Register Here ? <a href="register.html">Register Here</a>
		    </div>
    </form>

    <p id="message"></p>

    <div class="footer-text">
         2026 Your System
    </div>
</div>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const loginData = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

	fetch("http://localhost:8080/api/login", {
	    method: "POST",
	    headers: {
	        "Content-Type": "application/json"
	    },
	    body: JSON.stringify(loginData)
	})
	.then(async response => {

	    if (!response.ok) {
	        const msg = await response.text();
	        throw new Error(msg);
	    }

	    return response.json();
	})
	.then(user => {

	    console.log("LOGIN RESPONSE:", user);

	    localStorage.setItem("user", JSON.stringify(user));

	    if (user.role === "ADMIN") {
	        window.location.href = "admin.html";
	    } else {
	        window.location.href = "user.html";
	    }

	})
	.catch(error => {
	    document.getElementById("message").innerText = error.message;
	});
});
</script>
</body>
</html>
