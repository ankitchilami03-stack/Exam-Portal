<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contact-container {
            background: white;
            padding: 40px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        input:focus, textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .home-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
        }

        .home-link:hover {
            text-decoration: underline;
        }

        .info {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #777;
        }
		/* NAVBAR */
				        .navbar {
				            background-color: rgba(0,0,0,0.7);
				            padding: 15px;
				            position: fixed;
				            width: 100%;
				            top: 0;
				            z-index: 1000;
				        }

				        .navbar a {
				            color: white;
				            margin-right: 25px;
				            text-decoration: none;
				            font-size: 18px;
				            font-weight: bold;
				        }

				        .navbar a:hover {
				            color: yellow;
				        }
    </style>

</head>
<body>
	<div class="navbar">
		    <a href="index.html">Home</a>
		    <a href="login.html">Start Quiz</a>
		    <a href="aboutus.html">About Us</a>
		    <a href="contact.html">Contact</a>
			<a href="register.html" style="margin-left: 60%;">Register</a>
			<a href="login.html">Login</a>

		</div>

<div class="contact-container">

    <h2>Contact Us</h2>

	<form onsubmit="submitForm(event)">
	    <input type="text" placeholder="Enter your name" required>

	    <input type="email" placeholder="Enter your email" required>

	    <textarea placeholder="Write your message..." required></textarea>

	    <button type="submit">Send Message</button>
	</form>
	    <div class="info">
        We will get back to you soon.
    </div>

    <a href="index.html" class="home-link">Back to Home</a>

</div>
<script>
function submitForm(event) {
    event.preventDefault(); // stop page reload

    alert("Your message is submitted successfully!");

    // optional: reset form
    event.target.reset();
}
</script>
</body>
</html>
