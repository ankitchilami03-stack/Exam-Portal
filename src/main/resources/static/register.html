<!DOCTYPE html>
<html>
<head>
    <title>User Register</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .register-container {
            background: white;
            padding: 35px;
            width: 420px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
			margin-top: 70px;;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #38f9d7;
            box-shadow: 0 0 5px rgba(56,249,215,0.5);
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00c6ff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #009ec3;
        }

        #message {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
            color: green;
        }

        .note {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-top: 10px;
        }
		/* NAVBAR */
				        .navbar {
				            background-color: rgba(0,0,0,0.7);
				            padding: 15px;
				            position: fixed;
				            width: 100%;
				            top: 0;
				            z-index: 1000;
				        }

				        .navbar a {
				            color: white;
				            margin-right: 25px;
				            text-decoration: none;
				            font-size: 18px;
				            font-weight: bold;
				        }

				        .navbar a:hover {
				            color: yellow;
				        }
    </style>

</head>
<body>
	<div class="navbar">
		    <a href="index.html">Home</a>
		    <a href="login.html">Start Quiz</a>
		    <a href="aboutus.html">About Us</a>
		    <a href="contact.html">Contact</a>
			<a href="register.html" style="margin-left: 60%;">Register</a>
			<a href="login.html">Login</a>

		</div>


<div class="register-container">

    <h2>Create Account</h2>

    <form id="registerForm">

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="name" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
        </div>

        <div class="row">

            <div class="form-group">
                <label>Role</label>
                <input type="text" id="role" value="USER">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone">
            </div>

        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" id="address">
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="active" checked> Active
            </label>
        </div>

        <button type="submit">Register</button>

    </form>

    <p id="message"></p>

    <div class="note">
        Already have an account? <a href="login.html">Login Here</a>
    </div>

</div>


<script>
document.getElementById("registerForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const userData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        role: document.getElementById("role").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        active: document.getElementById("active").checked
    };

    fetch("http://localhost:8080/api/register", {  // 🔁 change URL if needed
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(userData)
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById("message").innerText = "User Registered Successfully!";
    })
    .catch(error => {
        document.getElementById("message").innerText = "Error: " + error;
    });
});
</script>

</body>
</html>
